# Context Platform — Production Docker Compose Configuration
# T11.8: Deployment Scripts
version: "3.9"

services:
  # PostgreSQL 18 + pgvector
  postgres:
    image: pgvector/pgvector:pg18
    container_name: context_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-context_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-context_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-context_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching + rate limiting)
  redis:
    image: redis:7-alpine
    container_name: context_platform_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Context Platform Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: context_platform_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-context_platform}:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/${POSTGRES_DB:-context_platform}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-600 per minute}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      DEDUP_SIMILARITY_THRESHOLD: ${DEDUP_SIMILARITY_THRESHOLD:-0.85}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Frontend (port 3001)
  admin_frontend:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile
    container_name: context_platform_admin
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    depends_on:
      - backend

  # User Frontend (port 3002)
  user_frontend:
    build:
      context: ../frontend/user
      dockerfile: Dockerfile
    container_name: context_platform_user
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    ports:
      - "${USER_PORT:-3002}:3002"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
